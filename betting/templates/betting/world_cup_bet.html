{% extends "betting/base.html" %}
{% block content %}
<h2>Tabellbet för {{ competition }}</h2>
<div class="table-responsive">
<table class="table table-striped table-hover">
    <thead>
        <tr>
            <th></th>
            <th>Världsmästare</th>
            <th>Skyttekung</th>
        </tr>
    </thead>
    <tbody>
        {% for user_id, user_data in result.items %}
        <tr>
            <td>{{ user_data.user.first_name }}</td>
            <td>{{ user_data.winner }}</td>
            <td>{{ user_data.top_scorer }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
</div>
{% endblock %}
